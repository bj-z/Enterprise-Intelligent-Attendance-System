# ============================================
# 阿里云生产环境配置
# 启动方式: spring.profiles.active=cloud
# ============================================
spring:
  datasource:
    url: jdbc:mysql://${RDS_HOST:127.0.0.1}:${RDS_PORT:3306}/attendance_system?useUnicode=true&characterEncoding=UTF-8&useSSL=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${RDS_USERNAME:root}
    password: ${RDS_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      idle-timeout: 300000
      connection-timeout: 10000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

logging:
  level:
    root: WARN
    com.attendance: INFO
  file:
    path: /app/logs

# 阿里云 RDS 使用 SSL 连接时需在此填入证书路径
# spring.datasource.hikari.data-source-properties.useSSL=true
# spring.datasource.hikari.data-source-properties.requireSSL=true

jwt:
  secret: ${JWT_SECRET:attendance-system-jwt-secret-key-2026-06-23}
  expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

knife4j:
  enable: false  # 生产环境关闭API文档

springdoc:
  swagger-ui:
    path: /doc.html
  api-docs:
    path: /v3/api-docs
